<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Session | Combat Korean</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MZTVHHQD');</script>

<body class="bg-alt">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MZTVHHQD"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <header>
        <div class="container header-container">
            <a href="index.html" class="logo">COMBAT KOREAN</a>
            <h4 id="lesson-title-nav" style="margin: 0; font-size: 0.9375rem; color: var(--text-muted);">...</h4>
            <a href="index.html" class="btn btn-secondary btn-sm">Exit Session</a>
        </div>
    </header>

    <main class="container">
        <div class="learn-container">
            <!-- Left Column: Video and Controls -->
            <div class="video-area">
                <div class="video-wrapper">
                    <div id="player"></div>
                </div>

                <div class="player-controls">
                    <button id="rewind-btn" class="btn btn-secondary">⏪ Rewind 10s</button>
                    <button id="speed-down-btn" class="btn btn-secondary">🔽 Slower</button>
                    <button id="speed-up-btn" class="btn btn-secondary">🔼 Faster</button>
                </div>

                <div class="explanation-section">
                    <h3 style="margin-bottom: 1.5rem;">Scene Explanation</h3>
                    <div class="explanation-grid">
                        <div class="exp-card">
                            <h4>🔑 Key Phrase</h4>
                            <p id="phrase-exp">Loading phrase explanation...</p>
                        </div>
                        <div class="exp-card">
                            <h4>💡 Context Note</h4>
                            <p id="context-note">Understanding how this phrase is used in real workplace situations.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Sentence Cards -->
            <div class="sidebar-area">
                <div class="sidebar-header">
                    <h3 style="margin-bottom: 0.5rem;">Interactive Lines</h3>
                    <p style="font-size: 0.875rem;">Click a line to jump to the scene.</p>
                </div>
                <div id="sentence-cards" class="cards-scroll-container">
                    <!-- Cards injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="learn.js"></script>
</body>
</html>
